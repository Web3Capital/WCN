<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>14 加入 WCN</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;max-width:1080px;margin:0 auto;padding:40px 24px;line-height:1.8;color:#0f172a;background:#f8fafc}h1{font-size:52px;line-height:1.05;letter-spacing:-.05em}p{font-size:18px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.card{background:#fff;border:1px solid #e2e8f0;border-radius:22px;padding:20px}.tag{display:inline-block;padding:6px 10px;border-radius:999px;background:#eefbf3;color:#059669;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}.note{margin-top:18px;border-left:4px solid #d97706;background:#fff7ed;padding:16px 18px;border-radius:0 14px 14px 0}@media(max-width:760px){.grid{grid-template-columns:1fr}h1{font-size:38px}}</style></head><body><span class="tag">第十四章 · 加入 WCN</span><h1>一个系统再完整，如果别人不知道怎么进入，它就很难真正形成网络。</h1><p>这一章负责把“理解 WCN”转成“进入 WCN”的具体路径：申请成为节点、申请合作、获取访问权限，以及如何正式联系。</p><div class="grid"><div class="card"><strong>14.1 申请成为节点</strong><p>给真正想进入网络的人一个正式入口。</p></div><div class="card"><strong>14.2 申请合作</strong><p>给机构、项目方、服务方、区域伙伴一个合作入口。</p></div><div class="card"><strong>14.3 获取访问权限</strong><p>说明访问权限不是默认开放，而是分层授权。</p></div><div class="card"><strong>14.4 联系方式</strong><p>给正式沟通与下一步动作一个清晰入口。</p></div></div><div class="note">加入 WCN 不是“点击注册”，而是进入一个有角色、有边界、有审核和有路径的系统。</div></body></html>
