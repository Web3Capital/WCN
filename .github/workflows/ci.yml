name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Prisma Generate
        run: npx prisma generate

      - name: Prisma Validate
        run: npx prisma validate

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Tests with Coverage
        run: npm run test:coverage

  build:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Prisma Generate
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: "1"
          NEXTAUTH_URL: "http://localhost:3000"
          NEXTAUTH_SECRET: "ci-build-secret-not-real"
          POSTGRES_URL: "postgresql://build:build@localhost:5432/wcn_build"

  e2e:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wcn
          POSTGRES_PASSWORD: wcn
          POSTGRES_DB: wcn_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wcn -d wcn_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_URL: postgresql://wcn:wcn@localhost:5432/wcn_e2e
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXTAUTH_SECRET: ci-e2e-playwright-secret-not-real-32chars
      SKIP_ENV_VALIDATION: "1"
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Prisma Generate
        run: npx prisma generate

      - name: Prisma Migrate
        run: npx prisma migrate deploy

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Business Loop E2E
        run: npx tsx scripts/e2e-business-loop.ts
