name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Prisma Generate
        run: npx prisma generate

      - name: Prisma Validate
        run: npx prisma validate

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
        continue-on-error: true
        # TODO: pre-existing — eslint 9 (installed) is incompatible with the legacy
        # .eslintrc.json. Migrate to flat config (eslint.config.mjs) and remove this.

      - name: Tests with Coverage
        run: npm run test:coverage

  build:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Prisma Generate
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: "1"
          NEXTAUTH_URL: "http://localhost:3000"
          NEXTAUTH_SECRET: "ci-build-secret-not-real"
          # `?sslmode=disable` — the CI postgres service container speaks
          # plain TCP. Without this, `next start` runs with NODE_ENV=production
          # and lib/prisma.ts defaults SSL on, which the container rejects with
          # "Error opening a TLS connection".
          POSTGRES_URL: "postgresql://build:build@localhost:5432/wcn_build?sslmode=disable"

  e2e:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wcn
          POSTGRES_PASSWORD: wcn
          POSTGRES_DB: wcn_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wcn -d wcn_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # `?sslmode=disable` — see Build job comment; the e2e postgres service
      # container speaks plain TCP and would otherwise be refused by SSL.
      POSTGRES_URL: postgresql://wcn:wcn@localhost:5432/wcn_e2e?sslmode=disable
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXTAUTH_SECRET: ci-e2e-playwright-secret-not-real-32chars
      SKIP_ENV_VALIDATION: "1"
      CI: "true"
      # Bypass Upstash-backed rate-limit in CI: `next start` runs with
      # NODE_ENV=production, the limiter is configured fail-closed, and CI
      # has no Upstash. Without this every /api/* call returns 429 and the
      # whole e2e suite is unreachable. See lib/rate-limit.ts.
      DISABLE_RATE_LIMITING: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Prisma Generate
        run: npx prisma generate

      - name: Prisma DB Push (e2e schema sync)
        # `db push` syncs schema -> ephemeral CI DB directly without reading
        # migration history. The repo's migration history has a baseline gap
        # (20260410000000_baseline_sync_all is empty SQL because the team
        # used `prisma db push` during early development; tables created via
        # push were never captured as CREATE TABLE migrations). As a result,
        # `migrate deploy` cannot run end-to-end on a fresh DB.
        # Production deploys remain on `migrate deploy` against real prod;
        # only the ephemeral e2e DB uses push.
        # Prisma 7 dropped --skip-generate; client was already generated above.
        run: npx prisma db push --accept-data-loss

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Business Loop E2E
        run: npx tsx scripts/e2e-business-loop.ts
